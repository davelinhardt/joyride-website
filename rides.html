<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Joyride — Ride Activity</title>
<link rel="icon" href="/assets/mark-canary.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  /* Layout — single column, max width tuned so the cards look like
     the in-app Activity tab on a phone-shaped column. */
  .rides-wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: clamp(24px, 4vw, 40px) clamp(16px, 4vw, 24px) 96px;
  }

  /* Headline — mirrors the in-app `styles.headline` exactly: canary
     yellow, centered, all-caps via letter-spacing + bold weight.
     (joiryde-rider/app/(tabs)/activity.tsx → const styles.headline) */
  .rides-headline {
    color: var(--canary);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    margin-top: 16px;
    margin-bottom: 24px;
  }

  /* Chip row — horizontally-scrolling row of filter chips, rectangular
     with 8px corners (NOT pills). Mirrors the in-app activity chips
     (joiryde-rider/app/(tabs)/activity.tsx → styles.chip /
     chipSelected / chipText). */
  .chip-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    overflow-y: hidden;
    margin-bottom: 12px;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip-row button {
    flex-shrink: 0;
    padding: 7px 12px;
    border-radius: 8px;
    background: #1A1A1A;
    border: 1px solid #2A2A2A;
    color: #9BA1A6;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background .12s var(--ease), color .12s var(--ease), border-color .12s var(--ease);
  }
  .chip-row button:hover { border-color: var(--canary); }
  .chip-row button.is-active {
    background: var(--canary);
    border-color: var(--canary);
    color: #000;
  }

  /* MiniRydeCard mirror — 3-row layout (joiryde-rider/components/
     mini-ryde-card.tsx). Row 1: headline slots (status badge L, kebab
     placeholder R). Row 2: address block (filled dot pickup + outlined
     dot dropoff, with labels). Row 3: driver photo + name + rating. */
  .mrc {
    display: block;
    background: #1A1A1A;
    border: 1px solid #2A2A2A;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    text-decoration: none;
    color: var(--fg);
    transition: border-color .15s var(--ease), transform .15s var(--ease);
  }
  .mrc:hover { border-color: var(--canary); transform: translateY(-1px); }

  /* Row 1: Headline */
  .mrc-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 14px;
  }
  .mrc-badge {
    display: inline-flex; align-items: center;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.8px; text-transform: uppercase;
    background: #2A2A2A; color: var(--fg-3);
  }
  .mrc-badge--pending     { background: rgba(255,239,0,0.15);  color: var(--canary); }
  .mrc-badge--scheduled   { background: rgba(74,222,128,0.15); color: #4ADE80; }
  .mrc-badge--completed   { background: rgba(74,222,128,0.18); color: #4ADE80; }
  .mrc-badge--cancelled   { background: rgba(252,165,165,0.18); color: #FCA5A5; }
  .mrc-badge--expired     { background: rgba(252,165,165,0.18); color: #FCA5A5; }
  .mrc-badge--searching,
  .mrc-badge--matched,
  .mrc-badge--confirmed,
  .mrc-badge--in_progress { background: rgba(255,239,0,0.15);  color: var(--canary); }
  .mrc-headline-right {
    font-size: 18px; font-weight: 700; color: var(--fg);
    line-height: 1;
  }

  /* Row 2: Address block — two routeRows separated by a connector
     line. Filled (canary) dot for pickup, outlined dot for dropoff. */
  .mrc-route {
    display: flex;
    align-items: stretch;
    gap: 12px;
    margin-bottom: 14px;
  }
  .mrc-route-stack { flex: 1; min-width: 0; }
  .mrc-route-row {
    display: flex; gap: 12px; align-items: flex-start;
  }
  .mrc-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0; margin-top: 4px;
  }
  .mrc-dot--filled { background: var(--canary); }
  .mrc-dot--outline { border: 2px solid var(--canary); background: transparent; }
  .mrc-route-line {
    margin-left: 4px; width: 2px; background: #2A2A2A;
    height: 14px; align-self: stretch;
  }
  .mrc-route-info { min-width: 0; flex: 1; }
  .mrc-route-label {
    color: var(--fg-3); font-size: 10px; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 2px;
  }
  .mrc-route-addr {
    color: var(--fg); font-size: 14px; line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .mrc-trailing {
    align-self: center;
    font-size: 17px; font-weight: 700; color: var(--canary);
    flex-shrink: 0;
  }

  /* Row 3: Driver row — photo + name + ★ rating. Omitted on cards
     with no assigned driver (e.g. a Pending ryde no one's bid on). */
  .mrc-person {
    display: flex; align-items: center; gap: 10px;
    padding-top: 12px;
    border-top: 1px solid #2A2A2A;
  }
  .mrc-person-photo {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    background: #2A2A2A;
  }
  .mrc-person-photo--placeholder {
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--canary); font-weight: 700;
    background: var(--ink);
  }
  .mrc-person-name { font-size: 14px; font-weight: 600; color: var(--fg); }
  .mrc-person-rating {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; color: var(--fg-3); margin-top: 2px;
  }
  .mrc-person-rating .star { color: var(--canary); }

  /* Empty / loading / error states. */
  .rides-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--fg-3);
  }
  .rides-state h2 { font-size: 18px; font-weight: 700; color: var(--fg); margin-bottom: 8px; }
  .rides-state p  { max-width: 44ch; margin: 0 auto; font-size: 14px; line-height: 1.5; }

  .load-more {
    display: block;
    margin: 20px auto 0;
    background: transparent;
    color: var(--fg);
    border: 1px solid #2A2A2A;
    border-radius: 999px;
    padding: 10px 20px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .load-more:hover { border-color: var(--canary); }
</style>
</head>
<body data-page="rides">

<main>
  <section class="rides-wrap">
    <h1 class="rides-headline">Ride Activity</h1>

    <div class="chip-row" id="chip-row">
      <button data-status="all"       class="is-active">ALL</button>
      <button data-status="pending">PENDING</button>
      <button data-status="scheduled">SCHEDULED</button>
      <button data-status="completed">COMPLETED</button>
      <button data-status="cancelled">CANCELLED</button>
      <button data-status="expired">EXPIRED</button>
    </div>

    <div id="rides-loading" class="rides-state">Loading your rides…</div>
    <div id="rides-empty" class="rides-state" hidden>
      <h2>No rides yet</h2>
      <p>Once you book your first ride on the Joyride app, it'll appear here with a downloadable receipt.</p>
    </div>
    <div id="rides-error" class="rides-state" hidden>
      <h2>Couldn't load your rides</h2>
      <p>Try refreshing the page. If the problem persists, log out and back in.</p>
    </div>

    <div id="rides-list"></div>
    <button id="load-more" class="load-more" hidden type="button">Load more</button>
  </section>
</main>

<script src="/js/api.js"></script>
<script src="/site.js"></script>
<script>
(function () {
  "use strict";

  // Auth gate — the rider tool is a private surface. No session →
  // bounce to /login.
  (async function gate() {
    var cached = JoyrideAPI.readCachedUser();
    if (!cached && !JoyrideAPI.getToken()) {
      window.location.replace("/login");
      return;
    }
    if (!cached) {
      var fresh = await JoyrideAPI.loadCurrentUser();
      if (!fresh) window.location.replace("/login");
    }
  })();

  var listEl    = document.getElementById("rides-list");
  var loadingEl = document.getElementById("rides-loading");
  var emptyEl   = document.getElementById("rides-empty");
  var errorEl   = document.getElementById("rides-error");
  var moreBtn   = document.getElementById("load-more");
  var chipRow   = document.getElementById("chip-row");

  var currentStatus = "all";
  var nextOffset    = null;
  var firstPageDone = false;

  chipRow.querySelectorAll("button").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var status = btn.dataset.status;
      if (status === currentStatus) return;
      chipRow.querySelectorAll("button").forEach(function (b) { b.classList.remove("is-active"); });
      btn.classList.add("is-active");
      currentStatus = status;
      resetAndLoad();
    });
  });

  moreBtn.addEventListener("click", function () {
    if (nextOffset == null) return;
    loadPage(nextOffset);
  });

  function setState(which) {
    loadingEl.hidden = which !== "loading";
    emptyEl.hidden   = which !== "empty";
    errorEl.hidden   = which !== "error";
  }

  function resetAndLoad() {
    listEl.innerHTML = "";
    moreBtn.hidden = true;
    nextOffset = null;
    firstPageDone = false;
    setState("loading");
    loadPage(0);
  }

  async function loadPage(offset) {
    try {
      var qs = "?status=" + encodeURIComponent(currentStatus)
             + "&offset=" + offset
             + "&limit=25";
      var data = await JoyrideAPI.apiGet("/api/rider/rides" + qs);
      var items = (data && data.items) || [];
      items.forEach(appendRideCard);
      nextOffset = data && data.nextOffset != null ? data.nextOffset : null;
      moreBtn.hidden = nextOffset == null;
      if (!firstPageDone) {
        firstPageDone = true;
        setState(items.length === 0 ? "empty" : "none");
      } else {
        setState("none");
      }
    } catch (err) {
      console.error("[rides] load failed", err);
      if (err && err.status === 401) {
        window.location.replace("/login");
        return;
      }
      setState("error");
    }
  }

  // Build a MiniRydeCard-style card. Three rows: status headline,
  // address block, driver row. Hidden conditionally for status
  // variants that don't have a driver attached.
  function appendRideCard(r) {
    var a = document.createElement("a");
    a.className = "mrc";
    a.href = "/receipt?id=" + encodeURIComponent(r.id);

    var status = String(r.status || "").toLowerCase();
    var headlineRight = formatFare(r);

    // ── Row 1: headline ────────────────────────────────────────
    var head = document.createElement("div");
    head.className = "mrc-head";
    var badge = document.createElement("span");
    badge.className = "mrc-badge mrc-badge--" + status;
    badge.textContent = (status || "—").replace(/_/g, " ");
    head.appendChild(badge);
    if (headlineRight) {
      var hr = document.createElement("span");
      hr.className = "mrc-headline-right";
      hr.textContent = headlineRight;
      head.appendChild(hr);
    }
    a.appendChild(head);

    // ── Row 2: address block ──────────────────────────────────
    var pickupLabel  = buildRouteLabel("PICKUP",  r.pickupAt || r.scheduledAt || r.completedAt || r.createdAt);
    var dropoffLabel = buildRouteLabel("DROPOFF", computeDropoffAt(r));
    var route = document.createElement("div");
    route.className = "mrc-route";
    route.innerHTML =
      '<div class="mrc-route-stack">' +
        '<div class="mrc-route-row">' +
          '<span class="mrc-dot mrc-dot--filled" aria-hidden="true"></span>' +
          '<div class="mrc-route-info">' +
            '<div class="mrc-route-label">' + escapeHtml(pickupLabel) + '</div>' +
            '<div class="mrc-route-addr">' + escapeHtml(shortAddress(r.pickupAddress)) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="mrc-route-line" aria-hidden="true"></div>' +
        '<div class="mrc-route-row">' +
          '<span class="mrc-dot mrc-dot--outline" aria-hidden="true"></span>' +
          '<div class="mrc-route-info">' +
            '<div class="mrc-route-label">' + escapeHtml(dropoffLabel) + '</div>' +
            '<div class="mrc-route-addr">' + escapeHtml(shortAddress(r.dropoffAddress)) + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    a.appendChild(route);

    // ── Row 3: driver row (only when a driver is attached) ────
    if (r.driver && r.driver.id) {
      var person = document.createElement("div");
      person.className = "mrc-person";
      var photoEl;
      if (r.driver.avatarUrl) {
        photoEl = document.createElement("img");
        photoEl.className = "mrc-person-photo";
        photoEl.src = r.driver.avatarUrl;
        photoEl.alt = r.driver.name || "";
      } else {
        photoEl = document.createElement("div");
        photoEl.className = "mrc-person-photo mrc-person-photo--placeholder";
        photoEl.textContent = ((r.driver.name || "?")[0] || "?").toUpperCase();
      }
      person.appendChild(photoEl);
      var info = document.createElement("div");
      var ratingText = "";
      if (r.driver.rating != null) {
        var rv = parseFloat(String(r.driver.rating)) || 5;
        ratingText =
          '<div class="mrc-person-rating">' +
            '<span class="star">★</span>' +
            '<span>' + rv.toFixed(2) +
              (r.driver.totalRatings ? ' · ' + r.driver.totalRatings + ' review' + (r.driver.totalRatings === 1 ? '' : 's') : '') +
            '</span>' +
          '</div>';
      }
      info.innerHTML =
        '<div class="mrc-person-name">' + escapeHtml(r.driver.name || "Joyride driver") + '</div>' +
        ratingText;
      person.appendChild(info);
      a.appendChild(person);
    }

    listEl.appendChild(a);
  }

  // "PICKUP - 5/19 1:42 pm" — mirrors the in-app MiniRydeCard.pickup.label.
  // Hides the time part when the date is missing.
  function buildRouteLabel(prefix, when) {
    var d = when ? new Date(when) : null;
    if (!d || isNaN(d.getTime())) return prefix;
    var mm = d.getMonth() + 1;
    var dd = d.getDate();
    var hr = d.getHours();
    var ampm = hr >= 12 ? "pm" : "am";
    hr = hr % 12 === 0 ? 12 : hr % 12;
    var min = String(d.getMinutes()).padStart(2, "0");
    return prefix + " - " + mm + "/" + dd + " " + hr + ":" + min + " " + ampm;
  }

  function computeDropoffAt(r) {
    // Prefer the actual completedAt; fall back to pickup + transport
    // minutes for scheduled/in-progress rides.
    if (r.completedAt) return r.completedAt;
    var base = r.pickupAt || r.scheduledAt || null;
    var mins = r.transportMinutes || r.estimatedDurationMinutes || 0;
    if (!base || !mins) return null;
    var d = new Date(base);
    if (isNaN(d.getTime())) return null;
    return new Date(d.getTime() + mins * 60_000).toISOString();
  }

  // Cheap version of shortAddress — keep the first ~36 chars and
  // drop trailing ", USA" etc. The in-app helper is in
  // joiryde-rider/lib/address-display.ts.
  function shortAddress(addr) {
    if (!addr) return "—";
    var s = String(addr).replace(/, USA$/i, "");
    return s.length > 50 ? s.slice(0, 49) + "…" : s;
  }

  function formatFare(r) {
    var candidates = [r.totalFare, r.completedAmount, r.estimatedFare, r.baseFare];
    for (var i = 0; i < candidates.length; i++) {
      var v = candidates[i];
      if (v == null) continue;
      var n = parseFloat(String(v));
      if (Number.isFinite(n) && n > 0) return "$" + n.toFixed(2);
    }
    return "";
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  resetAndLoad();
})();
</script>

</body>
</html>
