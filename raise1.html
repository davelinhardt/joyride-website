<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Joyride — Investor materials</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/assets/mark-canary.svg">
<style>
  :root {
    --canary: #FFEF00;
    --ink: #0A0A0A;
    --fg: #FFFFFF;
    --fg-dim: rgba(255, 255, 255, 0.62);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--ink);
    color: var(--fg);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
  }
  .mark { width: 84px; height: 84px; margin-bottom: 32px; }
  h1 {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 700;
    letter-spacing: -0.03em;
    margin: 0 0 16px;
    line-height: 1.05;
  }
  h1 em { font-style: normal; color: var(--canary); }
  p { font-size: 17px; color: var(--fg-dim); max-width: 48ch; margin: 0; line-height: 1.5; }
</style>
</head>
<body>
  <main>
    <img class="mark" src="/assets/mark-canary.svg" alt="Joyride">
    <h1>Investor materials <em>coming soon.</em></h1>
    <p>This page is reserved. The full deck and supporting materials will live here shortly. If you're expecting it now, drop a line to <a href="mailto:legal@joyride.cool" style="color: var(--canary); text-decoration: none;">legal@joyride.cool</a>.</p>
  </main>
</body>
</html>
