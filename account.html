<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Joyride — Your account</title>
<link rel="icon" href="/assets/mark-canary.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .account-wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: clamp(40px, 6vw, 80px) clamp(20px, 4vw, 40px) 120px;
  }
  .account-hello {
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: var(--s3);
  }
  .account-sub {
    color: var(--fg-3);
    font-size: 17px;
    margin-bottom: var(--s7);
    max-width: 56ch;
  }
  /* Action grid — one big card per available section.
     Cards render conditionally based on the user's userType + role.
     Driver users see their public-profile URL prominently because that's
     the URL they're meant to share with potential riders. */
  .action-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: var(--s4);
    margin-bottom: var(--s7);
  }
  .action-card {
    display: flex; flex-direction: column; gap: var(--s3);
    padding: 28px;
    border-radius: var(--r-xl);
    background: var(--surface);
    border: 1px solid var(--rule);
    text-decoration: none;
    color: var(--fg);
    transition: transform .15s var(--ease), border-color .15s var(--ease);
  }
  .action-card:hover {
    transform: translateY(-2px);
    border-color: var(--canary);
  }
  .action-card.is-primary {
    background: var(--canary); color: var(--ink); border-color: var(--canary);
  }
  .action-card .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; opacity: 0.7;
  }
  .action-card h2 {
    font-size: 22px; font-weight: 700; line-height: 1.15;
    letter-spacing: -0.02em;
  }
  .action-card p { font-size: 14px; line-height: 1.5; opacity: 0.85; }
  .action-card .go { margin-top: auto; font-weight: 600; font-size: 15px; }

  /* Verify-status note — shows "email and mobile verified" or a
     nudge to check inbox/SMS. Logout used to live next to this in
     a footer-row; the canonical logout button now sits in the
     site header on /account (see site.js → renderAuthCta). */
  .verify-status {
    padding-top: var(--s5);
    border-top: 1px solid var(--rule);
    color: var(--fg-3);
    font-size: 14px;
  }
  .verify-status.is-warn { color: #FCA5A5; }
</style>
</head>
<body data-page="account">

<main>
  <section class="account-wrap">
    <!-- Loading state — replaced once /api/rider/me resolves. Avoids
         a flash of broken UI if the session is gone (we redirect to
         /login in that case). -->
    <div id="account-loading" style="opacity: 0.6;">Loading your account…</div>

    <div id="account-content" hidden>
      <h1 class="account-hello">Hi, <span id="hello-name">there</span>.</h1>
      <p class="account-sub" id="account-sub">Welcome to your Joyride account.</p>

      <div class="action-grid" id="action-grid">
        <!-- Cards injected by JS based on user.userType / user.role -->
      </div>

      <p id="verify-status" class="verify-status"></p>
    </div>
  </section>
</main>

<script src="/js/api.js"></script>
<script src="/site.js"></script>
<script>
(function () {
  "use strict";

  // Gate the page on having a valid session. If we have a cached
  // user we paint immediately; otherwise we wait for /api/rider/me.
  // No session → redirect to login.
  var loadingEl = document.getElementById("account-loading");
  var contentEl = document.getElementById("account-content");

  function paint(user) {
    loadingEl.hidden = true;
    contentEl.hidden = false;
    document.getElementById("hello-name").textContent = user.firstName || "there";

    // Subline mirrors role + userType. Admin gets a chooser-style
    // line because they may have multiple legitimate destinations
    // (admin tool + their own driver profile, etc.) and we want it
    // to feel intentional — not like the page is "in the way" of
    // the admin tool.
    var sub = document.getElementById("account-sub");
    if (user.role === "admin") {
      sub.textContent = "Choose where you want to go. Admin tool, your driver profile, and your account are all one tap away.";
    } else if (user.userType === "driver" || user.userType === "both") {
      sub.textContent = "Manage your rides, your driver profile, and your shareable link.";
    } else {
      sub.textContent = "View your rides, download receipts, and manage your account.";
    }

    renderActionCards(user);
    renderVerifyStatus(user);
  }

  // Three-way chooser per Dave (2026-05-19): Rider, Driver, Admin.
  //
  // Each card is gated by capability — a non-admin doesn't see the
  // Admin card, a non-driver doesn't see the Driver card. Pure
  // admins see all three regardless (admins need to be able to
  // inspect rider/driver UX too).
  //
  // Primary (yellow) goes to the most likely destination given the
  // user's role: admin → Admin, driver-only → Driver, rider-only →
  // Rider. When the user has multiple capabilities (Dave: admin +
  // driver) we leave Admin primary because thats the tool they reach
  // for most often. Everyone gets the secondary "Download apps"
  // card as a fourth tile.
  function renderActionCards(user) {
    var grid = document.getElementById("action-grid");
    var isAdmin    = user.role === "admin";
    var isDriver   = user.userType === "driver" || user.userType === "both";
    var canRide    = user.userType === "rider"  || user.userType === "both" || isAdmin;
    var primaryKey = isAdmin ? "admin" : (isDriver ? "driver" : "rider");
    var cards = [];

    if (canRide) {
      cards.push({
        key: "rider",
        eyebrow: "Rider",
        h2: "My rides & receipts",
        p: "View every ride you've taken on Joyride and download receipts.",
        href: "/rides",
        go: "Open Rider tools →",
      });
    }

    if (isDriver || isAdmin) {
      // Even admin-only users get the Driver card so they can preview
      // the public profile UX. Falls back to /driver (debug entry)
      // when the admin has no username set.
      var profileSlug = user.username ? "/" + encodeURIComponent(user.username) : "/driver";
      cards.push({
        key: "driver",
        eyebrow: "Driver",
        h2: user.username ? "joyride.cool/" + user.username : "Your driver page",
        p: "Your public profile. Drivers share this URL with potential riders so they can book directly.",
        href: profileSlug,
        go: "View Driver page →",
      });
    }

    if (isAdmin) {
      cards.push({
        key: "admin",
        eyebrow: "Admin",
        h2: "Open the admin tool",
        p: "Manage drivers, riders, pricing, taxes, plans, and ride history.",
        href: JoyrideAPI.API_BASE + "/admin",
        go: "Open Admin tool →",
      });
    }

    cards.push({
      key: "apps",
      eyebrow: "Apps",
      h2: "Download Joyride",
      p: "The rider and driver apps are where rides actually happen. Links go live as soon as the apps ship.",
      href: "/#download",
      go: "Get the apps →",
    });

    grid.innerHTML = cards.map(function (c) {
      var isPrimary = c.key === primaryKey;
      return (
        '<a class="action-card' + (isPrimary ? " is-primary" : "") + '" href="' + c.href + '">' +
          '<span class="eyebrow">' + c.eyebrow + '</span>' +
          '<h2>' + c.h2 + '</h2>' +
          '<p>' + c.p + '</p>' +
          '<span class="go">' + c.go + '</span>' +
        '</a>'
      );
    }).join("");
  }

  function renderVerifyStatus(user) {
    var el = document.getElementById("verify-status");
    el.classList.remove("is-warn");
    if (!user.mobileVerified) {
      el.classList.add("is-warn");
      el.textContent = "Your mobile isn't verified yet — check your texts for a 6-digit code.";
    } else if (!user.emailVerified) {
      el.textContent = "Your email isn't verified yet — check your inbox.";
    } else {
      el.textContent = "Email and mobile verified ✓";
    }
  }

  // Logout is now bound to the yellow header button by site.js when
  // body[data-page=account] — see renderAuthCta there. No need for
  // a separate handler on this page.

  // Boot. Cached-paint first (instant UX), then verify with /me.
  //
  // IMPORTANT: only redirect to /login when there's *definitely* no
  // session. A transient /me failure (server redeploying, network
  // blip, 5xx) does NOT count — if we still have a cached user AND
  // a token, paint the cached user and let the next page load
  // retry. Otherwise we ping-pong with /login (which bounces back
  // to /account because the cached user is still present), causing
  // the flashing-tabs bug Dave hit 2026-05-19 right after a server
  // redeploy.
  //
  // loadCurrentUser() clears auth on 401, so getToken() returning
  // null after the call is the canonical "session expired" signal.
  (async function boot() {
    var cached = JoyrideAPI.readCachedUser();
    if (cached) paint(cached);

    var fresh = await JoyrideAPI.loadCurrentUser();
    if (fresh) {
      paint(fresh);
      return;
    }
    // /me didn't resolve. If we still have a token + a cached user,
    // this was a transient failure — keep the cached paint and bail
    // out without redirecting. The user can refresh later.
    if (JoyrideAPI.getToken() && cached) {
      return;
    }
    // No session left to lean on → send them to log in.
    window.location.replace("/login");
  })();
})();
</script>

</body>
</html>
