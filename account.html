<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Joyride — Your account</title>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png"><link rel="icon" type="image/svg+xml" href="/assets/mark-black.svg?v=3"><link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .account-wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: clamp(40px, 6vw, 80px) clamp(20px, 4vw, 40px) 120px;
  }
  /* Two-column header — greeting + subline on the left, the verify
     block on the right (per Dave 2026-05-20: use the empty area to
     the right of the headline rather than dropping verify under the
     action grid). Collapses to single column on narrow screens. */
  .account-top {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 360px);
    gap: clamp(24px, 4vw, 48px);
    align-items: start;
    margin-bottom: var(--s7);
  }
  @media (max-width: 720px) {
    .account-top { grid-template-columns: 1fr; }
  }
  .account-hello {
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: var(--s3);
  }
  .account-sub {
    color: var(--fg-3);
    font-size: 17px;
    max-width: 56ch;
    margin-bottom: 0;
  }
  /* Action grid — one big card per available section.
     Cards render conditionally based on the user's userType + role.
     Driver users see their public-profile URL prominently because that's
     the URL they're meant to share with potential riders. */
  .action-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: var(--s4);
    margin-bottom: var(--s7);
  }
  .action-card {
    display: flex; flex-direction: column; gap: var(--s3);
    padding: 28px;
    border-radius: var(--r-xl);
    background: var(--surface);
    border: 1px solid var(--rule);
    text-decoration: none;
    color: var(--fg);
    transition: transform .15s var(--ease), border-color .15s var(--ease);
  }
  .action-card:hover {
    transform: translateY(-2px);
    border-color: var(--canary);
  }
  .action-card.is-primary {
    background: var(--canary); color: var(--ink); border-color: var(--canary);
  }
  .action-card .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; opacity: 0.7;
  }
  .action-card h2 {
    font-size: 22px; font-weight: 700; line-height: 1.15;
    letter-spacing: -0.02em;
  }
  .action-card p { font-size: 14px; line-height: 1.5; opacity: 0.85; }
  .action-card .go { margin-top: auto; font-weight: 600; font-size: 15px; }

  /* Verification block — two rows (email + mobile), each with a
     status badge. Lives in the top-right column of .account-top so
     it sits next to the greeting instead of hanging off the bottom
     of the page. Mirrors the rider app's profile-screen pattern
     (joiryde-rider/app/(tabs)/profile.tsx → VerificationBadge):
       - Verified  → green ✓ Verified pill
       - Unverified → "Enter Code" · "Resend" links; tapping
                      Enter Code expands an inline 6-digit input
                      with a Verify button below the row. */
  .verify-block {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: var(--r-lg);
    padding: 18px 20px;
  }
  .verify-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 0;
    flex-wrap: wrap;
  }
  .verify-row .label {
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--fg-3);
    min-width: 60px;
  }
  .verify-row .value {
    flex: 1; min-width: 0;
    color: var(--fg); font-size: 15px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .verify-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600;
    flex-shrink: 0;
  }
  .verify-badge.is-verified {
    color: #22C55E;
  }
  .verify-badge .check {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; border-radius: 50%;
    background: #22C55E; color: #000;
    font-size: 10px; font-weight: 800;
  }
  .verify-badge .action {
    background: transparent; border: 0; padding: 0;
    color: var(--canary); font-family: var(--font);
    font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .verify-badge .action[disabled] { opacity: 0.5; cursor: progress; }
  .verify-badge .sep { color: #2A2A2A; }

  /* Inline code-entry panel — expands under a row when "Enter Code"
     is tapped. Hidden until activated. */
  .verify-panel {
    flex-basis: 100%;
    margin-top: 4px;
    display: flex; gap: 8px; align-items: center;
  }
  .verify-panel[hidden] { display: none; }
  .verify-panel input {
    flex: 1;
    height: 40px;
    padding: 0 14px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    border-radius: 10px;
    color: var(--fg);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 15px;
    letter-spacing: 0.15em;
  }
  .verify-panel input:focus { outline: 0; border-color: var(--canary); }
  .verify-panel .submit {
    background: var(--canary); color: var(--ink);
    border: 0; border-radius: 999px;
    padding: 0 16px; height: 40px;
    font-family: var(--font); font-size: 13px; font-weight: 700;
    cursor: pointer;
  }
  .verify-panel .submit[disabled] { opacity: 0.5; cursor: progress; }
  .verify-msg {
    flex-basis: 100%;
    margin-top: 4px;
    font-size: 12px;
    color: var(--fg-3);
  }
  .verify-msg.is-error { color: #FCA5A5; }
  .verify-msg.is-success { color: #22C55E; }

  /* Modal mode — when the body has .verify-modal-open, the SAME
     .verify-block we render inline becomes a centered full-screen
     overlay. Same DOM nodes + same JS handlers; only CSS differs.
     A dim backdrop sits behind it (rgba black 80%). Backdrop clicks
     deliberately do NOT close — only the X button closes (per Dave
     2026-05-20: "stays open until both codes are entered" unless
     the user explicitly dismisses).

     The close button + modal headline are only visible while
     .verify-modal-open is on the body. */
  .verify-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 100;
    display: none;
  }
  body.verify-modal-open .verify-modal-backdrop { display: block; }

  body.verify-modal-open { overflow: hidden; }
  body.verify-modal-open .verify-block {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(540px, calc(100vw - 32px));
    max-height: calc(100vh - 64px);
    overflow: auto;
    z-index: 101;
    padding: 32px;
  }
  body.verify-modal-open .verify-block .verify-row {
    padding: 14px 0;
  }
  /* Headline + tagline inside the verify-block, only shown in modal
     mode. Hidden inline so the top-right widget stays compact. */
  .verify-modal-only { display: none; }
  body.verify-modal-open .verify-modal-only { display: block; }
  body.verify-modal-open .verify-modal-headline {
    font-size: 22px; font-weight: 700; letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  body.verify-modal-open .verify-modal-tagline {
    color: var(--fg-3); font-size: 14px; line-height: 1.45;
    margin-bottom: 18px;
  }
  body.verify-modal-open .verify-modal-close {
    position: absolute;
    top: 14px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: transparent;
    border: 0;
    color: var(--fg-3);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
  }
  body.verify-modal-open .verify-modal-close:hover {
    color: var(--fg);
    background: var(--surface-2);
  }
</style>
</head>
<body data-page="account">

<main>
  <section class="account-wrap">
    <!-- Loading state — replaced once /api/rider/me resolves. Avoids
         a flash of broken UI if the session is gone (we redirect to
         /login in that case). -->
    <div id="account-loading" style="opacity: 0.6;">Loading your account…</div>

    <div id="account-content" hidden>
      <!-- Two-column top section: greeting left, verify-block right.
           Collapses to single column on narrow screens via the
           .account-top media query. -->
      <div class="account-top">
        <div>
          <h1 class="account-hello">Hi, <span id="hello-name">there</span>.</h1>
          <p class="account-sub" id="account-sub">Welcome to your Joyride account.</p>
        </div>
        <div class="verify-block">
          <!-- Modal-only chrome — invisible inline; only shown when
               body has .verify-modal-open. Close button, headline,
               and tagline turn the same DOM node into a guided
               post-signup verification step. -->
          <button type="button" class="verify-modal-close verify-modal-only" id="verify-modal-close" aria-label="Verify later">×</button>
          <div class="verify-modal-only">
            <div class="verify-modal-headline">Verify your account</div>
            <p class="verify-modal-tagline">We just sent a 6-digit code to your email and your phone. Enter both to finish setting up your account. You can verify later if you need to.</p>
          </div>
          <div class="verify-row" data-channel="email">
            <span class="label">Email</span>
            <span class="value" data-value></span>
            <span class="verify-badge" data-badge></span>
            <div class="verify-panel" hidden data-panel>
              <input type="text" inputmode="numeric" autocomplete="one-time-code"
                maxlength="6" placeholder="6-digit code" data-input>
              <button type="button" class="submit" data-submit>Verify</button>
            </div>
            <div class="verify-msg" hidden data-msg></div>
          </div>
          <div class="verify-row" data-channel="sms">
            <span class="label">Mobile</span>
            <span class="value" data-value></span>
            <span class="verify-badge" data-badge></span>
            <div class="verify-panel" hidden data-panel>
              <input type="text" inputmode="numeric" autocomplete="one-time-code"
                maxlength="6" placeholder="6-digit code" data-input>
              <button type="button" class="submit" data-submit>Verify</button>
            </div>
            <div class="verify-msg" hidden data-msg></div>
          </div>
        </div>
      </div>

      <div class="action-grid" id="action-grid">
        <!-- Cards injected by JS based on user.userType / user.role -->
      </div>
    </div>
  </section>
  <!-- Verification modal backdrop — z-index sits behind the verify
       block (which is z-index 101 when modal-open). Clicking it does
       NOT close the modal (intentional — only the X dismisses, per
       the "stays open until both codes entered" rule). -->
  <div class="verify-modal-backdrop" aria-hidden="true"></div>
</main>

<script src="/js/api.js"></script>
<script src="/site.js"></script>
<script src="/js/verify-modal-logic.js"></script>
<script>
(function () {
  "use strict";

  // Gate the page on having a valid session. If we have a cached
  // user we paint immediately; otherwise we wait for /api/rider/me.
  // No session → redirect to login.
  var loadingEl = document.getElementById("account-loading");
  var contentEl = document.getElementById("account-content");

  // Belt-and-suspenders try wrapper — a single render failure in any
  // sub-section shouldn't blank the whole account page. We log the
  // error to console (Dave hit a blank state on @founder signup
  // 2026-05-20; we now never silently swallow rendering errors).
  function safe(label, fn) {
    try { fn(); }
    catch (err) {
      console.error("[account] " + label + " failed:", err);
    }
  }

  function paint(user) {
    loadingEl.hidden = true;
    contentEl.hidden = false;

    safe("hello", function () {
      document.getElementById("hello-name").textContent = user.firstName || "there";
    });

    safe("sub", function () {
      var sub = document.getElementById("account-sub");
      if (user.role === "admin") {
        sub.textContent = "Choose where you want to go. Admin tool, your driver profile, and your account are all one tap away.";
      } else if (user.userType === "driver" || user.userType === "both") {
        sub.textContent = "Manage your rides, your driver profile, and your shareable link.";
      } else {
        sub.textContent = "View your rides, download receipts, and manage your account.";
      }
    });

    safe("renderActionCards",   function () { renderActionCards(user); });
    safe("renderVerifyStatus",  function () { renderVerifyStatus(user); });
    safe("maybeOpenVerifyModal", function () { maybeOpenVerifyModal(user); });
  }

  // Three-way chooser per Dave (2026-05-19): Rider, Driver, Admin.
  //
  // Each card is gated by capability — a non-admin doesn't see the
  // Admin card, a non-driver doesn't see the Driver card. Pure
  // admins see all three regardless (admins need to be able to
  // inspect rider/driver UX too).
  //
  // Primary (yellow) goes to the most likely destination given the
  // user's role: admin → Admin, driver-only → Driver, rider-only →
  // Rider. When the user has multiple capabilities (Dave: admin +
  // driver) we leave Admin primary because thats the tool they reach
  // for most often. Everyone gets the secondary "Download apps"
  // card as a fourth tile.
  function renderActionCards(user) {
    var grid = document.getElementById("action-grid");
    var isAdmin    = user.role === "admin";
    var isDriver   = user.userType === "driver" || user.userType === "both";
    var canRide    = user.userType === "rider"  || user.userType === "both" || isAdmin;
    var primaryKey = isAdmin ? "admin" : (isDriver ? "driver" : "rider");
    var cards = [];

    if (canRide) {
      cards.push({
        key: "rider",
        eyebrow: "Rider",
        h2: "My rides & receipts",
        p: "View every ride you've taken on Joyride and download receipts.",
        href: "/rides",
        go: "Open Rider tools →",
      });
    }

    if (isDriver || isAdmin) {
      // Even admin-only users get the Driver card so they can preview
      // the public profile UX. Falls back to /driver (debug entry)
      // when the admin has no username set.
      var profileSlug = user.username ? "/" + encodeURIComponent(user.username) : "/driver";
      cards.push({
        key: "driver",
        eyebrow: "Driver",
        h2: user.username ? "joyride.cool/" + user.username : "Your driver page",
        p: "Your public profile. Drivers share this URL with potential riders so they can book directly.",
        href: profileSlug,
        go: "View Driver page →",
      });
    }

    if (isDriver) {
      // Subscription plan management. Mirrors the driver app's
      // "SUBSCRIPTION PLANS & BILLING" screen but routed through the
      // /api/driver/subscription-plans HTTP endpoints rather than tRPC.
      // Driver-only intentionally (not isDriver || isAdmin) — admins
      // don't have a driver_profiles row to manage a plan on, and the
      // server endpoint 403s for them anyway.
      cards.push({
        key: "subscription",
        eyebrow: "Driver",
        h2: "Subscription Plans",
        p: "Switch between Basic, Growth, and Pro. Same plans + transaction fees as the Driver app.",
        href: "/subscription",
        go: "Manage subscription →",
      });
    }

    if (isAdmin) {
      cards.push({
        key: "admin",
        eyebrow: "Admin",
        h2: "Open the admin tool",
        p: "Manage drivers, riders, pricing, taxes, plans, and ride history.",
        href: "/admin",
        go: "Open Admin tool →",
      });
    }

    // Apps split into two explicit cards — Rider app + Driver app —
    // so a fresh signup can decide which one (or both) they want.
    // Drivers complete the multi-step driver application inside the
    // Driver app (license, insurance, vehicle, background check);
    // the website never owns that flow. Once approved, their
    // /account picks up the Driver card automatically because the
    // server-side userType flips.
    // Both hrefs are placeholders until App Store + Play listings are
    // public (per SESSION_HANDOFF: EAS Build is queued).
    cards.push({
      key: "rider-app",
      eyebrow: "Rider app",
      h2: "Download the Rider app",
      p: "Book rides, see your driver in real time, save favorites, manage payments. Coming soon to the App Store and Google Play.",
      href: "/#download-rider",
      go: "Get the Rider app →",
    });
    cards.push({
      key: "driver-app",
      eyebrow: "Driver app",
      h2: "Download the Driver app",
      p: "Want to drive? Install the Driver app and apply with these same Joyride credentials. Approval happens after license, insurance, vehicle, and background check.",
      href: "/#download-driver",
      go: "Get the Driver app →",
    });

    grid.innerHTML = cards.map(function (c) {
      var isPrimary = c.key === primaryKey;
      return (
        '<a class="action-card' + (isPrimary ? " is-primary" : "") + '" href="' + c.href + '">' +
          '<span class="eyebrow">' + c.eyebrow + '</span>' +
          '<h2>' + c.h2 + '</h2>' +
          '<p>' + c.p + '</p>' +
          '<span class="go">' + c.go + '</span>' +
        '</a>'
      );
    }).join("");
  }

  // Verification block — port of the rider app's VerificationBadge
  // pattern. Two rows (email + mobile). Each row independently shows
  // verified / unverified state and exposes inline Resend + Enter
  // Code actions when not yet verified. Code submit calls
  // /api/rider/check-verification and re-renders on success.
  function renderVerifyStatus(user) {
    renderVerifyRow("email", user.email,  user.emailVerified);
    renderVerifyRow("sms",   user.mobile, user.mobileVerified);
  }

  function rowEls(channel) {
    var row = document.querySelector('.verify-row[data-channel="' + channel + '"]');
    return {
      row: row,
      value:  row.querySelector("[data-value]"),
      badge:  row.querySelector("[data-badge]"),
      panel:  row.querySelector("[data-panel]"),
      input:  row.querySelector("[data-input]"),
      submit: row.querySelector("[data-submit]"),
      msg:    row.querySelector("[data-msg]"),
    };
  }

  function renderVerifyRow(channel, value, verified) {
    var els = rowEls(channel);
    els.value.textContent = value || "—";
    if (verified) {
      // Verified pill — collapse any open panel + clear stale msgs.
      els.badge.classList.add("is-verified");
      els.badge.innerHTML = '<span class="check" aria-hidden="true">✓</span> Verified';
      els.panel.hidden = true;
      hideMsg(els);
      return;
    }
    // Unverified — render "Enter Code · Resend" actions. Click handlers
    // are rebound each render so we never stack listeners.
    els.badge.classList.remove("is-verified");
    els.badge.innerHTML =
      '<button type="button" class="action" data-toggle>Enter Code</button>' +
      '<span class="sep">·</span>' +
      '<button type="button" class="action" data-resend>Resend</button>';
    var toggleBtn = els.badge.querySelector("[data-toggle]");
    var resendBtn = els.badge.querySelector("[data-resend]");
    toggleBtn.onclick = function () {
      els.panel.hidden = !els.panel.hidden;
      if (!els.panel.hidden) {
        hideMsg(els);
        els.input.focus();
      }
    };
    resendBtn.onclick = async function () {
      if (resendBtn.disabled) return;
      resendBtn.disabled = true;
      try {
        await JoyrideAPI.apiPost("/api/rider/send-verification", { channel: channel });
        showMsg(els, "success", channel === "email"
          ? "A new code has been sent to your email."
          : "A new code has been sent to your phone.");
        els.panel.hidden = false;
        els.input.focus();
      } catch (err) {
        showMsg(els, "error", (err && err.message) || "Couldn't send the code. Try again.");
      } finally {
        resendBtn.disabled = false;
      }
    };
    els.submit.onclick = function () { submitCode(channel); };
    els.input.onkeydown = function (e) {
      if (e.key === "Enter") submitCode(channel);
    };
  }

  async function submitCode(channel) {
    var els = rowEls(channel);
    var code = (els.input.value || "").trim();
    if (code.length < 4) {
      showMsg(els, "error", "Enter the code we sent you.");
      return;
    }
    els.submit.disabled = true;
    try {
      var data = await JoyrideAPI.apiPost("/api/rider/check-verification", {
        channel: channel,
        code: code,
      });
      // Server returns the updated rider — refresh local cache so
      // the badge flips to Verified and any other page reflects it.
      if (data && data.rider) {
        JoyrideAPI.cacheUser(data.rider);
        showMsg(els, "success", "Verified ✓");
        renderVerifyRow(channel,
          channel === "email" ? data.rider.email : data.rider.mobile,
          channel === "email" ? data.rider.emailVerified : data.rider.mobileVerified);
        // If the modal is open and both channels are now verified,
        // auto-close (per Dave 2026-05-20: "modal stays open until
        // both codes are entered" — the inverse implies "auto-close
        // once both are done").
        if (data.rider.emailVerified && data.rider.mobileVerified) {
          closeVerifyModal();
        }
      }
    } catch (err) {
      showMsg(els, "error", (err && err.message) || "Verification failed.");
    } finally {
      els.submit.disabled = false;
    }
  }

  // ───── Verification modal ─────────────────────────────────────
  // Triggered when ?verify=1 is on the URL AND at least one channel
  // is unverified. The X button (.verify-modal-close) closes the
  // modal AND clears the URL param so reloads don't re-open it.
  // Backdrop click is intentionally inert — only X closes.
  function openVerifyModal() {
    console.log("[account] opening verification modal");
    document.body.classList.add("verify-modal-open");
  }
  function closeVerifyModal() {
    document.body.classList.remove("verify-modal-open");
    // Strip ?verify=1 from the URL without a reload so a refresh
    // doesn't re-open the modal once the user has dismissed it
    // (or completed verification).
    try {
      var url = new URL(window.location.href);
      if (url.searchParams.has("verify")) {
        url.searchParams.delete("verify");
        window.history.replaceState({}, "", url.toString());
      }
    } catch (_) { /* old browsers — ignore */ }
  }
  var modalCloseBtn = document.getElementById("verify-modal-close");
  if (modalCloseBtn) {
    modalCloseBtn.onclick = function () { closeVerifyModal(); };
  }
  // Escape key also dismisses (matches typical modal UX, treated as
  // the same affordance as the X — does NOT auto-resurface).
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && document.body.classList.contains("verify-modal-open")) {
      closeVerifyModal();
    }
  });

  // Decide whether to auto-open. Called once per paint after the
  // user is hydrated. Idempotent: subsequent calls don't re-open
  // a previously-closed modal because we strip ?verify=1 on close.
  // Decision logic lives in /js/verify-modal-logic.js so it can be
  // unit-tested under Node — see verify-modal-logic.test.cjs.
  function maybeOpenVerifyModal(user) {
    if (!user) return;
    var L = window.JoyrideVerifyModal;
    if (!L) return; // module failed to load; fail-soft, don't blank the page
    var search = window.location.search;
    if (L.shouldOpenVerifyModal(search, user)) {
      openVerifyModal();
    } else if (L.shouldCloseVerifyModal(search, user)) {
      closeVerifyModal();
    }
  }

  function showMsg(els, kind, text) {
    els.msg.hidden = false;
    els.msg.classList.remove("is-error", "is-success");
    if (kind === "error")   els.msg.classList.add("is-error");
    if (kind === "success") els.msg.classList.add("is-success");
    els.msg.textContent = text;
  }
  function hideMsg(els) {
    els.msg.hidden = true;
    els.msg.classList.remove("is-error", "is-success");
    els.msg.textContent = "";
  }

  // Logout is now bound to the yellow header button by site.js when
  // body[data-page=account] — see renderAuthCta there. No need for
  // a separate handler on this page.

  // Boot. Cached-paint first (instant UX), then verify with /me.
  //
  // IMPORTANT: only redirect to /login when there's *definitely* no
  // session. A transient /me failure (server redeploying, network
  // blip, 5xx) does NOT count — if we still have a cached user AND
  // a token, paint the cached user and let the next page load
  // retry. Otherwise we ping-pong with /login (which bounces back
  // to /account because the cached user is still present), causing
  // the flashing-tabs bug Dave hit 2026-05-19 right after a server
  // redeploy.
  //
  // loadCurrentUser() clears auth on 401, so getToken() returning
  // null after the call is the canonical "session expired" signal.
  (async function boot() {
    var cached = JoyrideAPI.readCachedUser();
    if (cached) paint(cached);

    var fresh = await JoyrideAPI.loadCurrentUser();
    if (fresh) {
      paint(fresh);
      return;
    }
    // /me didn't resolve. If we still have a token + a cached user,
    // this was a transient failure — keep the cached paint and bail
    // out without redirecting. The user can refresh later.
    if (JoyrideAPI.getToken() && cached) {
      return;
    }
    // No session left to lean on → send them to log in.
    window.location.replace("/login");
  })();
})();
</script>

</body>
</html>
